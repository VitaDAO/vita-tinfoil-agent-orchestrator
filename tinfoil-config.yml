cvm-version: 0.7.1
cpus: 2
memory: 8192

containers:
  - name: "orchestrator"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-orchestrator:v0.4.2@sha256:83aff85f3958bba4380ba01cb37fc8462b9996488d49a1a2fca2b507047ff572"
    env:
      - WEBHOOK_PORT: "8080"
      - LLM_MODEL_ID: "kimi-k2-5"
      - LLM_MODEL_NAME: "Kimi K2.5"
    secrets:
      # Telegram
      - TELEGRAM_BOT_TOKEN
      # Supabase
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      # Internal Tinfoil containers
      - QMD_GPU_URL
      - QMD_API_SECRET
      - CLASSIFIER_URL
      # Sandbox management
      - SANDBOX_AUTH_SECRET
      - TINFOIL_ADMIN_KEY
      # Webhook auth
      - CRON_WEBHOOK_SECRET
      - BOT_AUTH_SECRET
      # LLM
      - LLM_BASE_URL
      - LLM_API_KEY
      # External services
      - SUPERMEMORY_API_KEY
    command: []

shim:
  upstream-port: 8080
  paths:
    - /api/cron-webhook
    - /api/query
    - /api/aubrai
    - /api/flush
    - /api/provision-agent
    - /api/agent-status
    - /health
