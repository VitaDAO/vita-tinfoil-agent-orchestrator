cvm-version: 0.7.1
cpus: 2
memory: 8192

containers:
  - name: "orchestrator"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-orchestrator:latest"
    env:
      - WEBHOOK_PORT: "8080"
      - E2B_TEMPLATE: "vita-agent-v1-dev"
    secrets:
      - TELEGRAM_BOT_TOKEN
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - E2B_API_KEY
      - QMD_GPU_URL
      - QMD_API_SECRET
      - CLASSIFIER_URL
      - SUPERMEMORY_API_KEY
      - CRON_WEBHOOK_SECRET
      - BOT_AUTH_SECRET
      - LLM_BASE_URL
      - LLM_API_KEY
      - LLM_MODEL_ID
      - LLM_MODEL_NAME
      - TINFOIL_SANDBOX_URL
      - TINFOIL_SANDBOX_AUTH_SECRET
      - TINFOIL_TEST_USERS
      - DEV_USER_IDS
      - BASETEN_API_KEY
    command: []

shim:
  upstream-port: 8080
  paths:
    - /api/cron-webhook
    - /api/query
    - /api/aubrai
    - /api/flush
    - /health
