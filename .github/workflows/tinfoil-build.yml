name: Build and Attest

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      # Build and push to ghcr.io
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: build
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t "$IMAGE_LOWER" .
          DIGEST=$(docker buildx imagetools inspect "$IMAGE_LOWER" --format '{{.Manifest.Digest}}')
          FULL_REF="${IMAGE_LOWER}@${DIGEST}"
          echo "image=${FULL_REF}" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: ${FULL_REF}"

      # Update config with digest and force-move tag (MUST succeed before attestation)
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's|image:.*|image: "${{ steps.build.outputs.image }}"|' tinfoil-config.yml
          git add tinfoil-config.yml
          git commit -m "Update image digest to ${{ github.ref_name }}"
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force

      # Push to main (non-critical — tag + release are the important ones)
      - run: git push origin HEAD:main || echo "Warning: main push failed (non-critical)"
        continue-on-error: true

      # Tinfoil attestation — creates the release from the updated tag
      - uses: tinfoilsh/pri-build-action@5d450a7f30904866efc401e24484b935b7ed52dd # v0.6.1
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: "false"
